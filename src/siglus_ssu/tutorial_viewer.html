<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Siglus Tutorial Graph</title>
<style>
:root {
    --bg: #f8fbfd;
    --bg-soft: #eef6fb;
    --bg-elev: #ffffff;
    --bg-chip: #f4fafe;
    --border: #dce8f2;
    --border-soft: rgba(37, 99, 173, 0.1);
    --text: #2e2e2e;
    --text-soft: #587087;
    --text-dim: #7b91a5;
    --accent: #2563ad;
    --accent-soft: #e9f5fc;
    --accent-strong: #1b4c7a;
    --warn: #bf8a35;
    --node: #e5f2fb;
    --node-stroke: #8ebad8;
    --node-active: #cfe8fa;
    --edge: rgba(72, 116, 158, 0.58);
    --edge-active: rgba(37, 99, 173, 0.9);
    --shadow: 0 2px 10px rgba(70, 120, 160, 0.05);
    --shadow-strong: 0 8px 24px rgba(80, 120, 180, 0.12);
}
html.theme-dark {
    --bg: #0d141b;
    --bg-soft: #111b24;
    --bg-elev: #18232e;
    --bg-chip: #15212d;
    --border: #243647;
    --border-soft: rgba(129, 190, 255, 0.14);
    --text: #e6edf5;
    --text-soft: #a4b8cb;
    --text-dim: #7d93aa;
    --accent: #81beff;
    --accent-soft: #16273a;
    --accent-strong: #cde7ff;
    --warn: #e1b261;
    --node: #1d3244;
    --node-stroke: #7ab1e2;
    --node-active: #284b69;
    --edge: rgba(157, 195, 234, 0.42);
    --edge-active: rgba(129, 190, 255, 0.92);
    --shadow: 0 2px 10px rgba(0, 0, 0, 0.24);
    --shadow-strong: 0 8px 24px rgba(0, 0, 0, 0.4);
}
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
}
* {
    box-sizing: border-box;
}
.app {
    width: 100%;
    height: 100%;
    position: relative;
}
.loading-overlay {
    position: absolute;
    inset: 0;
    z-index: 30;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(248, 251, 253, 0.78);
    backdrop-filter: blur(5px);
    pointer-events: auto;
}
.loading-card {
    width: min(360px, calc(100vw - 48px));
    padding: 24px 24px 20px;
    border-radius: 18px;
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.96);
    box-shadow: 0 16px 42px rgba(80, 120, 180, 0.18);
}
.loading-head {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
}
.loading-spinner {
    width: 24px;
    height: 24px;
    border-radius: 999px;
    border: 3px solid rgba(37, 99, 173, 0.16);
    border-top-color: var(--accent);
    animation: loading-spin 0.8s linear infinite;
    flex: 0 0 auto;
}
.loading-title {
    font-size: 16px;
    font-weight: 700;
    color: #24405d;
}
.loading-detail {
    min-height: 18px;
    margin-bottom: 14px;
    color: var(--text-soft);
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
}
.loading-bar {
    width: 100%;
    height: 10px;
    overflow: hidden;
    border-radius: 999px;
    background: #e7f0f7;
    border: 1px solid #d7e5f0;
}
.loading-bar-fill {
    width: 0%;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #2c7fd0 0%, #62b6ec 100%);
    transition: width 0.16s ease;
}
.loading-bar-fill.is-indeterminate {
    width: 36%;
    animation: loading-slide 1.05s ease-in-out infinite;
}
.loading-progress {
    margin-top: 10px;
    color: var(--text-dim);
    font-size: 12px;
    text-align: right;
}
@keyframes loading-spin {
    from {
        transform: rotate(0deg);
    }
    to {
        transform: rotate(360deg);
    }
}
@keyframes loading-slide {
    0% {
        transform: translateX(-120%);
    }
    100% {
        transform: translateX(320%);
    }
}
.tool-btn {
    border: none;
    background: var(--accent-soft);
    color: var(--accent);
    min-width: 84px;
    padding: 12px 20px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    box-shadow: var(--shadow);
    transition: background 0.18s, color 0.18s, box-shadow 0.18s, transform 0.18s;
}
.tool-btn.is-toggle-active {
    background: var(--accent);
    color: #ffffff;
}
.tool-btn.is-toggle-active:hover {
    background: #2e76c3;
    color: #ffffff;
}
.tool-btn:hover {
    background: #d9eefa;
    color: var(--accent-strong);
    box-shadow: 0 4px 16px rgba(70, 120, 160, 0.09);
}
.tool-btn:active {
    background: #c8e4f5;
    color: #1973b8;
    transform: scale(0.97);
}
.control-select {
    width: 100%;
    min-width: 0;
    height: 44px;
    padding: 0 14px;
    border: 2px solid #e0e6ed;
    border-radius: 9px;
    outline: none;
    background: var(--bg-elev);
    color: #242b37;
    font: inherit;
    transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
}
.control-select:focus {
    background: #eaf4fb;
    border-color: var(--accent);
    box-shadow: var(--shadow);
}
.control-input {
    width: 100%;
    min-width: 0;
    height: 44px;
    padding: 0 14px;
    border: 2px solid #e0e6ed;
    border-radius: 9px;
    outline: none;
    background: var(--bg-elev);
    color: #242b37;
    font: inherit;
    transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
}
.control-input:focus {
    background: #eaf4fb;
    border-color: var(--accent);
    box-shadow: var(--shadow);
}
.file-input {
    display: none;
}
.drawer-trigger {
    position: absolute;
    inset: 0 auto 0 0;
    width: 26px;
    z-index: 3;
    cursor: pointer;
}
.drawer {
    position: absolute;
    inset: 0 auto 0 0;
    z-index: 4;
    width: 388px;
    overflow: auto;
    padding: 22px 20px;
    border-right: 1px solid var(--border);
    background: var(--bg-soft);
    box-shadow: var(--shadow-strong);
    transition: transform 0.22s ease, box-shadow 0.22s ease;
}
.drawer:not(.is-pinned):not(.is-open) {
    transform: translateX(calc(-100% + 14px));
    box-shadow: none;
}
.header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
}
.mini-btn {
    min-width: 0;
    padding: 8px 12px;
    font-size: 12px;
}
.card {
    margin-bottom: 14px;
    padding: 16px 16px 15px;
    border-radius: 15px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
}
.card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
}
.card-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--accent);
}
.card-kicker {
    color: var(--text-dim);
    font-size: 11px;
}
.stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
}
.stat {
    padding: 12px 12px;
    border-radius: 12px;
    background: #f8fbfd;
    border: 1px solid #e6eef5;
}
.stat-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
}
.stat-value {
    font-size: 20px;
    font-weight: 700;
}
.kv {
    display: grid;
    grid-template-columns: 92px 1fr;
    gap: 8px 12px;
    font-size: 12px;
    line-height: 1.55;
}
.kv dt {
    margin: 0;
    color: var(--text-dim);
}
.kv dd {
    margin: 0;
    color: var(--text);
    word-break: break-word;
}
.section-list,
.control-list,
.payload-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.search-results {
    margin-top: 12px;
    max-height: 256px;
    overflow: auto;
}
.search-result-row {
    width: 100%;
    display: block;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid #e6eef5;
    background: #f8fbfd;
    color: #242b37;
    cursor: pointer;
    text-align: left;
    box-shadow: var(--shadow);
}
.search-result-row:hover {
    border-color: rgba(37, 99, 173, 0.2);
    background: #eff7fd;
}
.search-result-title {
    font-size: 12px;
    font-weight: 600;
    line-height: 1.5;
    color: #242b37;
    word-break: break-word;
}
.search-result-subtitle {
    margin-top: 4px;
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-soft);
    word-break: break-word;
}
.tool-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-top: 12px;
}
.pin-btn {
    min-width: 0;
    padding: 8px 14px;
    font-size: 12px;
}
.payload-item {
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid #e6eef5;
    background: #f8fbfd;
    color: #242b37;
    font-size: 13px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
}
.stage.is-drop-target::after {
    content: attr(data-drop-text);
    position: absolute;
    inset: 28px;
    display: grid;
    place-items: center;
    border-radius: 20px;
    border: 2px dashed rgba(37, 99, 173, 0.4);
    background: rgba(233, 245, 252, 0.82);
    color: #2563ad;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.03em;
    pointer-events: none;
}
.link-row {
    width: 100%;
    display: block;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid #e6eef5;
    background: #f8fbfd;
    color: #242b37;
    cursor: pointer;
    text-align: left;
    box-shadow: var(--shadow);
}
.link-row:hover {
    border-color: rgba(37, 99, 173, 0.2);
    background: #eff7fd;
}
.link-row-main {
    min-width: 0;
}
.link-row-text {
    font-size: 12px;
    line-height: 1.55;
    color: #242b37;
    word-break: break-word;
}
.pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid rgba(37, 99, 173, 0.12);
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 11px;
    white-space: nowrap;
}
.pill.start {
    border-color: rgba(191, 138, 53, 0.18);
    background: #fbf1df;
    color: var(--warn);
}
.stage {
    position: relative;
    width: 100%;
    height: 100%;
    background: var(--bg);
}
.stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(146, 177, 205, 0.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(146, 177, 205, 0.18) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events: none;
}
.stage-overlay {
    position: absolute;
    inset: 16px 18px auto 18px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 18px;
    pointer-events: none;
}
.stage-chips {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}
.stage-chip {
    pointer-events: auto;
    padding: 8px 12px;
    border-radius: 12px;
    border: 1px solid rgba(37, 99, 173, 0.12);
    background: rgba(255, 255, 255, 0.94);
    color: var(--text-soft);
    font-size: 12px;
    box-shadow: var(--shadow);
}
.stage-chip strong {
    color: var(--accent-strong);
}
#graphCanvas {
    display: block;
    width: 100%;
    height: 100%;
}
.empty {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    padding: 24px;
    text-align: center;
    color: var(--text-soft);
    font-size: 15px;
}
html.theme-dark .loading-overlay {
    background: rgba(8, 12, 17, 0.8);
}
html.theme-dark .loading-card {
    background: rgba(24, 35, 46, 0.96);
    box-shadow: 0 16px 42px rgba(0, 0, 0, 0.42);
}
html.theme-dark .loading-title {
    color: var(--text);
}
html.theme-dark .loading-bar {
    background: #10202e;
    border-color: #1f3446;
}
html.theme-dark .tool-btn:hover {
    background: #22384f;
    color: var(--accent-strong);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.24);
}
html.theme-dark .tool-btn:active {
    background: #2b4a67;
    color: var(--accent-strong);
}
html.theme-dark .control-select,
html.theme-dark .control-input {
    border-color: #2a3c4e;
    background: var(--bg-elev);
    color: var(--text);
}
html.theme-dark .control-select:focus,
html.theme-dark .control-input:focus {
    background: #1d2c3b;
}
html.theme-dark .stat,
html.theme-dark .payload-item,
html.theme-dark .link-row,
html.theme-dark .search-result-row {
    background: #111c26;
    border-color: #22313f;
    color: var(--text);
}
html.theme-dark .link-row:hover,
html.theme-dark .search-result-row:hover {
    background: #152433;
    border-color: #335271;
}
html.theme-dark .link-row-text,
html.theme-dark .search-result-title {
    color: var(--text);
}
html.theme-dark .stage-chip {
    background: rgba(24, 35, 46, 0.94);
    border-color: rgba(129, 190, 255, 0.16);
}
html.theme-dark .stage.is-drop-target::after {
    border-color: rgba(129, 190, 255, 0.4);
    background: rgba(18, 33, 47, 0.92);
    color: var(--accent);
}
html.theme-dark .stage::before {
    background-image:
        linear-gradient(rgba(95, 129, 162, 0.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(95, 129, 162, 0.18) 1px, transparent 1px);
}
.hidden {
    display: none !important;
}
@media (max-width: 980px) {
    .drawer {
        width: min(86vw, 360px);
    }
    .stage-overlay {
        right: 12px;
        left: 12px;
        gap: 12px;
        flex-direction: column;
    }
    .tool-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>
<div class="app">
    <input id="fileInput" class="file-input" type="file" accept=".json,application/json">
    <div id="loadingOverlay" class="loading-overlay hidden" aria-live="polite" aria-busy="true">
        <div class="loading-card">
            <div class="loading-head">
                <div class="loading-spinner"></div>
                <div id="loadingTitle" class="loading-title">Loading graph</div>
            </div>
            <div id="loadingDetail" class="loading-detail"></div>
            <div class="loading-bar">
                <div id="loadingBarFill" class="loading-bar-fill is-indeterminate"></div>
            </div>
            <div id="loadingProgress" class="loading-progress">Preparing...</div>
        </div>
    </div>
    <div id="drawerTrigger" class="drawer-trigger"></div>
    <aside id="drawer" class="drawer is-pinned">
        <section class="card">
            <div class="card-header">
                <div id="controlsTitle" class="card-title">Controls</div>
                <div class="header-actions">
                    <button id="langBtn" class="tool-btn mini-btn" type="button">ZH</button>
                    <button id="themeBtn" class="tool-btn mini-btn" type="button">Dark</button>
                    <button id="pinBtn" class="tool-btn pin-btn mini-btn" type="button">Unpin</button>
                </div>
            </div>
            <div class="control-list">
                <select id="graphSelect" class="control-select hidden">
                    <option value="">Current graph</option>
                </select>
            </div>
            <div class="tool-grid">
                <button id="fitBtn" class="tool-btn" type="button">Fit</button>
                <button id="layoutBtn" class="tool-btn" type="button">Relayout</button>
                <button id="resetBtn" class="tool-btn" type="button">Reset</button>
                <button id="openBtn" class="tool-btn" type="button">Open JSON</button>
            </div>
        </section>
            <section class="card">
                <div class="card-header">
                    <div id="searchTitle" class="card-title">Search</div>
                    <div id="searchStatus" class="card-kicker">Idle</div>
                </div>
                <div class="control-list">
                    <select id="searchMode" class="control-select">
                        <option value="content">Dialogue / options</option>
                        <option value="node">Node number</option>
                        <option value="scene">Scene name</option>
                        <option value="sceneLine">Scene @ line</option>
                    </select>
                    <input id="searchInput" class="control-input" type="search" placeholder="Search payload lines or option labels">
                </div>
                <div class="tool-grid">
                    <button id="searchBtn" class="tool-btn" type="button">Find</button>
                    <button id="clearSearchBtn" class="tool-btn" type="button">Clear</button>
                </div>
                <div id="searchResults" class="section-list search-results"></div>
            </section>
            <section class="card">
                <div class="card-header">
                    <div id="overviewTitle" class="card-title">Graph Overview</div>
                    <div id="graphMode" class="card-kicker">static</div>
                </div>
                <div class="stats">
                    <div class="stat">
                        <div id="statScenesLabel" class="stat-label">Scenes</div>
                        <div id="statGraphs" class="stat-value">-</div>
                    </div>
                    <div class="stat">
                        <div id="statNodesLabel" class="stat-label">Nodes</div>
                        <div id="statNodes" class="stat-value">-</div>
                    </div>
                    <div class="stat">
                        <div id="statEdgesLabel" class="stat-label">Edges</div>
                        <div id="statEdges" class="stat-value">-</div>
                    </div>
                </div>
            </section>
            <section class="card">
                <div class="card-header">
                    <div id="selectionTitle" class="card-title">Selection</div>
                    <div id="selectionBadge" class="pill">None</div>
                </div>
                <div id="selectionMeta" class="section-list">
                    <div class="pill">Click a node to inspect its relations.</div>
                </div>
            </section>
            <section class="card">
                <div class="card-header">
                    <div id="outgoingTitle" class="card-title">Outgoing Relations</div>
                    <div id="outgoingBadge" class="card-kicker">0</div>
                </div>
                <div id="outgoingList" class="section-list"></div>
            </section>
            <section class="card">
                <div class="card-header">
                    <div id="incomingTitle" class="card-title">Incoming Relations</div>
                    <div id="incomingBadge" class="card-kicker">0</div>
                </div>
                <div id="incomingList" class="section-list"></div>
            </section>
            <section class="card">
                <div class="card-header">
                    <div id="payloadTitle" class="card-title">Payload</div>
                    <div id="payloadBadge" class="card-kicker">0</div>
                </div>
                <div id="payloadList" class="payload-list">
                    <div class="pill">Payload is shown only for the selected node.</div>
                </div>
            </section>
    </aside>
    <main class="stage" id="graphStage" data-drop-text="Drop JSON to open">
        <canvas id="graphCanvas"></canvas>
        <div class="stage-overlay">
            <div class="stage-chips">
                <div class="stage-chip"><strong id="chipGraph">-</strong></div>
                <div class="stage-chip"><span id="chipNodesLabel">Nodes</span> <strong id="chipNodes">-</strong></div>
                <div class="stage-chip"><span id="chipEdgesLabel">Edges</span> <strong id="chipEdges">-</strong></div>
            </div>
        </div>
        <div id="emptyState" class="empty hidden"></div>
    </main>
</div>
<script>
(() => {
    const canvas = document.getElementById("graphCanvas");
    const ctx = canvas.getContext("2d");
    const stage = document.getElementById("graphStage");
    const loadingOverlay = document.getElementById("loadingOverlay");
    const loadingTitle = document.getElementById("loadingTitle");
    const loadingDetail = document.getElementById("loadingDetail");
    const loadingBarFill = document.getElementById("loadingBarFill");
    const loadingProgress = document.getElementById("loadingProgress");
    const emptyState = document.getElementById("emptyState");
    const drawer = document.getElementById("drawer");
    const drawerTrigger = document.getElementById("drawerTrigger");
    const pinBtn = document.getElementById("pinBtn");
    const langBtn = document.getElementById("langBtn");
    const themeBtn = document.getElementById("themeBtn");
    const openBtn = document.getElementById("openBtn");
    const fileInput = document.getElementById("fileInput");
    const graphSelect = document.getElementById("graphSelect");
    const fitBtn = document.getElementById("fitBtn");
    const layoutBtn = document.getElementById("layoutBtn");
    const resetBtn = document.getElementById("resetBtn");
    const searchMode = document.getElementById("searchMode");
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const clearSearchBtn = document.getElementById("clearSearchBtn");
    const searchStatus = document.getElementById("searchStatus");
    const searchResults = document.getElementById("searchResults");
    const controlsTitle = document.getElementById("controlsTitle");
    const searchTitle = document.getElementById("searchTitle");
    const overviewTitle = document.getElementById("overviewTitle");
    const statScenesLabel = document.getElementById("statScenesLabel");
    const statNodesLabel = document.getElementById("statNodesLabel");
    const statEdgesLabel = document.getElementById("statEdgesLabel");
    const selectionTitle = document.getElementById("selectionTitle");
    const outgoingTitle = document.getElementById("outgoingTitle");
    const incomingTitle = document.getElementById("incomingTitle");
    const payloadTitle = document.getElementById("payloadTitle");
    const graphMode = document.getElementById("graphMode");
    const statGraphs = document.getElementById("statGraphs");
    const statNodes = document.getElementById("statNodes");
    const statEdges = document.getElementById("statEdges");
    const selectionBadge = document.getElementById("selectionBadge");
    const selectionMeta = document.getElementById("selectionMeta");
    const payloadBadge = document.getElementById("payloadBadge");
    const payloadList = document.getElementById("payloadList");
    const outgoingBadge = document.getElementById("outgoingBadge");
    const incomingBadge = document.getElementById("incomingBadge");
    const outgoingList = document.getElementById("outgoingList");
    const incomingList = document.getElementById("incomingList");

    function t(key, vars) {
        const lang = UI_TEXT[state.lang] ? state.lang : "en";
        const fallback = UI_TEXT.en[key];
        let text = UI_TEXT[lang][key];
        if (text === undefined) {
            text = fallback !== undefined ? fallback : key;
        }
        let out = String(text);
        for (const [name, value] of Object.entries(vars || {})) {
            out = out.replaceAll(`{${name}}`, String(value));
        }
        return out;
    }

    function roleOf(node) {
        const incoming = Number(node?.incoming || 0);
        const outgoing = Number(node?.outgoing || 0);
        if (incoming > 1 && outgoing > 1) {
            return "junction";
        }
        if (outgoing > 1) {
            return "branch";
        }
        if (incoming > 1) {
            return "merge";
        }
        if (outgoing === 0) {
            return "terminal";
        }
        return "dialogue";
    }

    function roleLabel(role) {
        if (role === "branch") {

    function roleSymbol(role) {
        if (role === "branch") {
            return "B";
        }
        if (role === "merge") {
            return "M";
        }
        if (role === "junction") {
            return "J";
        }
        if (role === "terminal") {
            return "T";
        }
        return "D";
    }

    function payloadLines(node) {
        return Array.isArray(node?.payload) ? node.payload.map((line) => String(line || "")).filter(Boolean) : [];
    }

    function lineLabel(node) {
        const startLine = Math.max(0, Number(node?.start_line || 0));
        const endLine = Math.max(0, Number(node?.end_line || 0));
        if (startLine > 0 && endLine > 0) {
            const finalLine = Math.max(startLine, endLine);
            return startLine === finalLine ? `L${startLine}` : `L${startLine}-${finalLine}`;
        }
        if (startLine > 0) {
            return `L${startLine}`;
        }
        if (endLine > 0) {
            return `L${endLine}`;
        }
        return "";
    }

    function nodeNumberLabel(node) {
        const nodeNo = Math.max(0, Number(node?.node_no || 0));
        if (nodeNo > 0) {
            return `N${nodeNo}`;
        }
        return String(node?.id || "-");
    }

    function nodeTitle(node) {
        const scene = node?.scene_name ? String(node.scene_name) : "";
        const line = lineLabel(node);
        if (scene && line) {
            return `${scene} @ ${line}`;
        }
        return String(node?.title || node?.scene_name || node?.id || "Untitled node");
    }

    function sceneLabel(node) {
        if (!node) {
            return "-";
        }
        const titled = nodeTitle(node);
        if (titled) {
            return titled;
        }
        if (node.scene_name) {
            return String(node.scene_name);
        }
        if (node.scene_no !== undefined && node.scene_no !== null) {
            return `scene ${node.scene_no}`;
        }
        if (node.scene_id) {
            return String(node.scene_id);
        }
        return String(node.id || "-");
    }

    function normalizeSearch(value) {
        return String(value || "").trim().toLowerCase();
    }

    function compactSearch(value) {
        return normalizeSearch(value).replace(/\s+/g, "");
    }

    function fuzzySubsequenceScore(query, target) {
        const q = compactSearch(query);
        const tvalue = compactSearch(target);
        if (!q || !tvalue) {
            return Number.POSITIVE_INFINITY;
        }
        if (tvalue.includes(q)) {
            return 0;
        }
        let qIndex = 0;
        let first = -1;
        let last = -1;
        for (let index = 0; index < tvalue.length && qIndex < q.length; index += 1) {
            if (tvalue[index] !== q[qIndex]) {
                continue;
            }
            if (first < 0) {
                first = index;
            }
            last = index;
            qIndex += 1;
        }
        if (qIndex !== q.length || first < 0 || last < first) {
            return Number.POSITIVE_INFINITY;
        }
        return (last - first + 1) - q.length;
    }

    function fuzzyContentScore(query, segments) {
        let best = Number.POSITIVE_INFINITY;
        for (const segment of segments) {
            const text = String(segment || "");
            const normalized = normalizeSearch(text);
            const compact = compactSearch(text);
            if (!normalized || !compact) {
                continue;
            }
            if (normalized.includes(normalizeSearch(query)) || compact.includes(compactSearch(query))) {
                return 0;
            }
            const score = fuzzySubsequenceScore(query, text);
            if (score < best) {
                best = score;
            }
        }
        return best;
    }

    function updateSearchPlaceholder() {
        const mode = String(searchMode?.value || "content");
        if (mode === "node") {
            searchInput.placeholder = t("searchNodePlaceholder");
            return;

        if (mode === "scene") {
            searchInput.placeholder = t("searchScenePlaceholder");
            return;

        if (mode === "sceneLine") {

        searchStatus.textContent = String(text || t("idle"));
