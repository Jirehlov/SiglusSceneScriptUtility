    function nodeSearchText(node, mode) {
        if (!node) {
            return "";
        }
        if (mode === "node") {
            return `${nodeNumberLabel(node)}\n${String(node.id || "")}`.toLowerCase();
        }
        if (mode === "scene") {
            return String(node.scene_name || "").toLowerCase();
        }
        if (mode === "sceneLine") {
            const title = nodeTitle(node).toLowerCase();
            return `${title}\n${title.replace(/\s+/g, "")}`;
        }
        const parts = [...payloadLines(node)];
        const outgoing = state.outgoingMap.get(node.id) || [];
        const incoming = state.incomingMap.get(node.id) || [];
        for (const edge of outgoing) {
            if (state.visibleNodeMap.has(edge.target) && edge.label) {
                parts.push(String(edge.label));
            }
        }
        for (const edge of incoming) {
            if (state.visibleNodeMap.has(edge.source) && edge.label) {
                parts.push(String(edge.label));
            }
        }
        return parts.join("\n").toLowerCase();
    }

    function nodeSearchSegments(node) {
        const parts = [...payloadLines(node)];
        const outgoing = state.outgoingMap.get(node.id) || [];
        const incoming = state.incomingMap.get(node.id) || [];
        for (const edge of outgoing) {
            if (state.visibleNodeMap.has(edge.target) && edge.label) {
                parts.push(String(edge.label));
            }
        }
        for (const edge of incoming) {
            if (state.visibleNodeMap.has(edge.source) && edge.label) {
                parts.push(String(edge.label));
            }
        }
        return parts.filter(Boolean);
    }

    function bestContentPreview(query, segments) {
        const normalizedQuery = normalizeSearch(query);
        const compactQuery = compactSearch(query);
        let bestText = "";
        let bestScore = Number.POSITIVE_INFINITY;
        for (const segment of segments) {
            const text = String(segment || "").trim();
            if (!text) {
                continue;
            }
            const normalized = normalizeSearch(text);
            const compact = compactSearch(text);
            if (normalized.includes(normalizedQuery) || compact.includes(compactQuery)) {
                return text;
            }
            const score = fuzzySubsequenceScore(query, text);
            if (score < bestScore) {
                bestScore = score;
                bestText = text;
            }
        }
        return bestText;
    }

    function collectSearchMatches(query, mode) {
        const normalized = normalizeSearch(query);
        if (!normalized) {
            return [];
        }
        const candidates = state.visibleNodes.slice();
        const matches = [];
        for (const node of candidates) {
            let score = Number.POSITIVE_INFINITY;
            let preview = "";
            if (mode === "content") {
                const segments = nodeSearchSegments(node);
                score = fuzzyContentScore(query, segments);
                preview = bestContentPreview(query, segments);
            } else if (mode === "node") {
                const text = nodeSearchText(node, mode);
                const compact = normalized.replace(/[\s#]/g, "");
                const numeric = compact.startsWith("n") ? compact.slice(1) : compact;
                if (String(Number(node.node_no || 0)) === numeric) {
                    score = -1;
                } else {
                    score = fuzzySubsequenceScore(query, text);
                }
                preview = node.id ? String(node.id) : "";
            } else {
                const text = nodeSearchText(node, mode);
                if (text.includes(normalized) || compactSearch(text).includes(compactSearch(query))) {
                    score = 0;
                } else {
                    score = fuzzySubsequenceScore(query, text);
                }
                preview = mode === "sceneLine" ? node.scene_name || "" : nodeTitle(node);
            }
            if (!Number.isFinite(score)) {
                continue;
            }
            matches.push({ node, score, preview });
        }
        matches.sort((a, b) => (
            a.score - b.score
            || Number(a.node.node_no || 0) - Number(b.node.node_no || 0)
            || nodeTitle(a.node).localeCompare(nodeTitle(b.node), "ja")
        ));
        return matches.slice(0, 80);
    }

    function renderSearchResults(matches) {
        searchResults.replaceChildren();
        if (!matches.length) {
            const pill = document.createElement("div");
            pill.className = "pill";
            pill.textContent = t("searchResultsHint");
            searchResults.appendChild(pill);
            return;
        }
        for (const match of matches) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "search-result-row";
            const title = document.createElement("div");
            title.className = "search-result-title";
            title.textContent = `${nodeNumberLabel(match.node)} | ${nodeTitle(match.node)}`;
            button.appendChild(title);
            if (match.preview) {
                const subtitle = document.createElement("div");
                subtitle.className = "search-result-subtitle";
                subtitle.textContent = match.preview;
                button.appendChild(subtitle);
            }
            button.addEventListener("click", () => {
                centerOnNode(match.node);
                updateSelection(match.node);
                setSearchStatus(t("searchMatched", { node: nodeNumberLabel(match.node) }));
            });
            searchResults.appendChild(button);
        }
    }

    function clearSearchResults() {
        renderSearchResults([]);
    }

    function runSearch() {
        if (!state.visibleNodes.length) {
            setSearchStatus(t("searchNoGraph"));
            renderSearchResults([]);
            return;
        }
        const mode = String(searchMode.value || "content");
        const query = String(searchInput.value || "");
        const normalized = normalizeSearch(query);
        if (!normalized) {
            setSearchStatus(t("searchEnterQuery"));
            renderSearchResults([]);
            return;
        }
        const matches = collectSearchMatches(query, mode);
        if (!matches.length) {
            setSearchStatus(t("searchNoMatch"));
            renderSearchResults([]);
            return;
        }
        renderSearchResults(matches);
        if (matches.length === 1) {
            centerOnNode(matches[0].node);
            updateSelection(matches[0].node);
            setSearchStatus(t("searchSingleMatch"));
            return;
        }
        setSearchStatus(t("searchMatches", { count: matches.length }));
    }

    function waitForPaint() {
        return new Promise((resolve) => {
            window.requestAnimationFrame(() => {
                window.requestAnimationFrame(resolve);
            });
        });
    }

    function formatBytes(value) {
        const size = Math.max(0, Number(value) || 0);
        if (!size) {
            return "0 B";
        }
        const units = ["B", "KB", "MB", "GB"];
        let index = 0;
        let current = size;
        while (current >= 1024 && index < units.length - 1) {
            current /= 1024;
            index += 1;
        }
        return `${current >= 10 || index === 0 ? current.toFixed(0) : current.toFixed(1)} ${units[index]}`;
    }

    function hashText(value) {
        let hash = 2166136261;
        const text = String(value || "");
        for (let index = 0; index < text.length; index += 1) {
            hash ^= text.charCodeAt(index);
            hash = Math.imul(hash, 16777619);
        }
        return hash >>> 0;
    }

    function setLoading(active, title, detail, loaded, total) {
        state.loading = !!active;
        loadingOverlay.classList.toggle("hidden", !state.loading);
        loadingTitle.textContent = String(title || t("loadingGraph"));
        loadingDetail.textContent = String(detail || "");
        const knownTotal = Math.max(0, Number(total) || 0);
        const knownLoaded = Math.max(0, Number(loaded) || 0);
        if (state.loading && knownTotal > 0) {
            const percent = Math.max(0, Math.min(100, (knownLoaded / knownTotal) * 100));
            loadingBarFill.classList.remove("is-indeterminate");
            loadingBarFill.style.width = `${percent.toFixed(1)}%`;
            loadingProgress.textContent = `${formatBytes(knownLoaded)} / ${formatBytes(knownTotal)} (${Math.round(percent)}%)`;
            syncEdgeAnimationLoop();
            return;
        }
        loadingBarFill.classList.add("is-indeterminate");
        loadingBarFill.style.width = "";
        loadingProgress.textContent = state.loading ? t("working") : "";
        syncEdgeAnimationLoop();
    }

    function clearLoading() {
        setLoading(false, "", "", 0, 0);
    }

    function syncEdgeAnimationLoop() {
        const shouldRun = !state.loading && state.visibleEdges.length > 0;
        if (!shouldRun) {
            if (state.edgeAnimationFrame) {
                window.cancelAnimationFrame(state.edgeAnimationFrame);
            }
            state.edgeAnimationFrame = 0;
            state.edgeAnimationClock = 0;
            return;
        }
        if (!state.edgeAnimationFrame) {
            state.edgeAnimationClock = 0;
            state.edgeAnimationFrame = window.requestAnimationFrame(runEdgeAnimationFrame);
        }
    }

    function readJsonFile(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => {
                try {
                    setLoading(true, t("loadingGraph"), String(file?.name || ""), Number(file?.size || 0), Number(file?.size || 0));
                    resolve(JSON.parse(String(reader.result || "{}")));
                } catch (error) {
                    reject(error);
                }
            };
            reader.onerror = () => reject(reader.error || new Error("Read failed"));
            reader.onprogress = (event) => {
                const total = event.lengthComputable ? Number(event.total || 0) : Number(file?.size || 0);
                setLoading(true, t("loadingGraph"), String(file?.name || ""), Number(event.loaded || 0), total);
            };
            reader.readAsText(file, "utf-8");
        });
    }

    function dragHasFiles(event) {
        return Array.from(event.dataTransfer?.types || []).includes("Files");
    }

    async function openGraphFile(file) {
        if (!file) {
            return;
        }
        emptyState.classList.add("hidden");
        setLoading(true, t("loadingGraph"), String(file.name || ""), 0, Number(file.size || 0));
        await waitForPaint();
        try {
            const data = await readJsonFile(file);
            setLoading(true, t("working"), String(file.name || ""), 0, 0);
            await waitForPaint();
            loadData(data);
        } catch (error) {
            emptyState.classList.remove("hidden");
            emptyState.textContent = t("failedReadJson", { message: error instanceof Error ? error.message : String(error) });
        } finally {
            clearLoading();
            state.dragDepth = 0;
            stage.classList.remove("is-drop-target");
        }
    }

    async function readJsonResponse(response, label) {
        const total = Math.max(0, Number(response.headers.get("Content-Length")) || 0);
        if (!response.body || !response.body.getReader) {
            setLoading(true, t("loadingGraph"), label, 0, total);
            const text = await response.text();
            setLoading(true, t("loadingGraph"), label, total, total);
            return JSON.parse(text);
        }
        const reader = response.body.getReader();
        const chunks = [];
        const decoder = new TextDecoder("utf-8");
        let loaded = 0;
        while (true) {
            const { done, value } = await reader.read();
            if (done) {
                break;
            }
            if (value) {
                chunks.push(value);
                loaded += value.byteLength;
                setLoading(true, t("loadingGraph"), label, loaded, total);
            }
        }
        setLoading(true, t("loadingGraph"), label, loaded, total || loaded);
        let text = "";
        for (let index = 0; index < chunks.length; index += 1) {
            text += decoder.decode(chunks[index], { stream: index + 1 < chunks.length });
        }
        text += decoder.decode();
        return JSON.parse(text);
    }

    async function openGraphUrl(urlValue) {
        if (!urlValue) {
            return false;
        }
        let label = "";
        try {
            label = new URL(urlValue, window.location.href).pathname.split("/").pop() || urlValue;
        } catch (error) {
            label = urlValue;
        }
        emptyState.classList.add("hidden");
        setLoading(true, t("loadingGraph"), label, 0, 0);
        await waitForPaint();
        try {
            const response = await fetch(urlValue, { cache: "no-store" });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const data = await readJsonResponse(response, label);
            setLoading(true, t("working"), label, 0, 0);
            await waitForPaint();
            loadData(data);
            return true;
        } catch (error) {
            emptyState.classList.remove("hidden");
            emptyState.textContent = t("failedAutoLoadJson", { message: error instanceof Error ? error.message : String(error) });
            return false;
        } finally {
            clearLoading();
        }
    }

    function autoLoadUrl() {
        try {
            const current = new URL(window.location.href);
            const value = current.searchParams.get("json");
            if (!value) {
                return "";
            }
            return new URL(value, current).toString();
        } catch (error) {
            return "";
        }
    }

    function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const dpr = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = Math.floor(rect.width * dpr);
        canvas.height = Math.floor(rect.height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        draw();
    }

    function worldToScreen(x, y) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: rect.width / 2 + (x + state.panX) * state.zoom,
            y: rect.height / 2 + (y + state.panY) * state.zoom,
        };
    }

    function screenToWorld(x, y) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (x - rect.width / 2) / state.zoom - state.panX,
            y: (y - rect.height / 2) / state.zoom - state.panY,
        };
    }

    function nodeSize(node) {
        const size = node.role === "branch" || node.role === "junction" ? 32 : 28;
        return { width: size, height: size };
    }

    function nodeRadius(node) {
        const { width, height } = nodeSize(node);
        return Math.max(width, height) * 0.72;
    }

    function drawRoundedRect(x, y, w, h, r, fill, stroke, lineWidth) {
        const rr = Math.min(r, h / 2, w / 2);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + w, y, x + w, y + h, rr);
        ctx.arcTo(x + w, y + h, x, y + h, rr);
        ctx.arcTo(x, y + h, x, y, rr);
        ctx.arcTo(x, y, x + w, y, rr);
        ctx.closePath();
        ctx.fillStyle = fill;
        ctx.strokeStyle = stroke;
        ctx.lineWidth = lineWidth;
        ctx.fill();
        ctx.stroke();
    }

    function drawArrow(x1, y1, x2, y2, color) {
        const angle = Math.atan2(y2 - y1, x2 - x1);
        const head = 8;
        ctx.beginPath();
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - Math.cos(angle - Math.PI / 7) * head, y2 - Math.sin(angle - Math.PI / 7) * head);
        ctx.lineTo(x2 - Math.cos(angle + Math.PI / 7) * head, y2 - Math.sin(angle + Math.PI / 7) * head);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
    }

    function edgeCurve(edge) {
        const source = state.visibleNodeMap.get(edge.source);
        const target = state.visibleNodeMap.get(edge.target);
        if (!source || !target) {
            return null;
        }
        const a = worldToScreen(source.x, source.y);
        const b = worldToScreen(target.x, target.y);
        const selected = state.selectedNode && (state.selectedNode.id === source.id || state.selectedNode.id === target.id);
        const label = String(edge.label || "");
        const color = selected ? "rgba(37, 99, 173, 0.9)" : edge.cross_scene ? "rgba(54, 178, 156, 0.7)" : "rgba(72, 116, 158, 0.58)";
        const mx = (a.x + b.x) / 2;
        const my = (a.y + b.y) / 2;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const baseBend = Math.min(36, Math.max(-36, (Number(source.scene_no || 0) - Number(target.scene_no || 0)) * 0.15));
        const parallelCount = Math.max(1, Number(edge.parallelCount || 1));
        const parallelIndex = Number(edge.parallelIndex || 0);
        const parallelShift = parallelCount > 1 ? (parallelIndex - (parallelCount - 1) / 2) * 24 : 0;
        const bend = baseBend + parallelShift;
        const nx = -dy || 1;
        const ny = dx || 0;
        const nlen = Math.hypot(nx, ny) || 1;
        const cx = mx + (nx / nlen) * bend;
        const cy = my + (ny / nlen) * bend;
        return {
            a,
            b,
            cx,
            cy,
            selected,
            label,
            color,
        };
    }

    function quadraticPoint(a, c, b, t) {
        const omt = 1 - t;
        return {
            x: omt * omt * a.x + 2 * omt * t * c.x + t * t * b.x,
            y: omt * omt * a.y + 2 * omt * t * c.y + t * t * b.y,
        };
    }

    function quadraticTangent(a, c, b, t) {
        return {
            x: 2 * (1 - t) * (c.x - a.x) + 2 * t * (b.x - c.x),
            y: 2 * (1 - t) * (c.y - a.y) + 2 * t * (b.y - c.y),
        };
    }

    function particleStride() {
        const edgeCount = Math.max(0, Number(state.visibleEdges.length || 0));
        if (state.zoom < 0.06) {
            return 6;
        }
        if (edgeCount > 4200) {
            return 5;
        }
        if (edgeCount > 2600) {
            return 4;
        }
        if (edgeCount > 1500) {
            return 3;
        }
        if (edgeCount > 700) {
            return 2;
        }
        return 1;
    }

    function drawEdgeParticle(edge, geometry, edgeIndex, timestamp) {
        if (!timestamp || state.loading || state.zoom < 0.045) {
            return;
        }
        const selected = !!geometry.selected;
        const stride = particleStride();
        if (!selected && stride > 1 && (edgeIndex % stride) !== 0) {
            return;
        }
        const phase = ((timestamp / 1000) * 0.34 + Number(edge.motionOffset || 0)) % 1;
        const t = 0.12 + phase * 0.76;
        const head = quadraticPoint(geometry.a, { x: geometry.cx, y: geometry.cy }, geometry.b, t);
        const tail = quadraticPoint(geometry.a, { x: geometry.cx, y: geometry.cy }, geometry.b, Math.max(0.06, t - 0.065));
        const tangent = quadraticTangent(geometry.a, { x: geometry.cx, y: geometry.cy }, geometry.b, t);
        const tangentLength = Math.hypot(tangent.x, tangent.y) || 1;
        const ux = tangent.x / tangentLength;
        const uy = tangent.y / tangentLength;
        const trailLength = selected ? 13 : 10;
        const trailStartX = head.x - ux * trailLength;
        const trailStartY = head.y - uy * trailLength;
        const glow = selected ? "rgba(37, 99, 173, 0.98)" : edge.cross_scene ? "rgba(54, 178, 156, 0.9)" : "rgba(37, 99, 173, 0.82)";
        const halo = selected ? "rgba(37, 99, 173, 0.14)" : edge.cross_scene ? "rgba(54, 178, 156, 0.12)" : "rgba(37, 99, 173, 0.1)";
        ctx.beginPath();
        ctx.moveTo(trailStartX, trailStartY);
        ctx.lineTo(tail.x, tail.y);
        ctx.lineTo(head.x, head.y);
        ctx.strokeStyle = glow;
        ctx.lineWidth = selected ? 2.8 : 2.1;
        ctx.lineCap = "round";
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(head.x, head.y, selected ? 3.8 : 3.1, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(head.x, head.y, selected ? 7.4 : 6.2, 0, Math.PI * 2);
        ctx.fillStyle = halo;
        ctx.fill();
    }

    function drawEdge(edge, edgeIndex, timestamp) {
        const geometry = edgeCurve(edge);
        if (!geometry) {
            return;
        }
        ctx.beginPath();
        ctx.moveTo(geometry.a.x, geometry.a.y);
        ctx.quadraticCurveTo(geometry.cx, geometry.cy, geometry.b.x, geometry.b.y);
        ctx.strokeStyle = geometry.color;
        ctx.lineWidth = geometry.selected ? 3.8 : edge.cross_scene ? 2.8 : 2.4;
        ctx.stroke();
        drawArrow((geometry.cx + geometry.b.x) / 2, (geometry.cy + geometry.b.y) / 2, geometry.b.x, geometry.b.y, geometry.color);
        drawEdgeParticle(edge, geometry, edgeIndex, timestamp);
        if (geometry.label && state.zoom >= 0.34) {
            const lx = (geometry.a.x + 2 * geometry.cx + geometry.b.x) / 4;
            const ly = (geometry.a.y + 2 * geometry.cy + geometry.b.y) / 4;
            ctx.font = '600 11px "Segoe UI"';
            const pad = 8;
            const width = Math.min(260, ctx.measureText(geometry.label).width + pad * 2);
            drawRoundedRect(
                lx - width / 2,
                ly - 11,
                width,
                22,
                11,
                geometry.selected ? "rgba(255, 255, 255, 0.98)" : "rgba(248, 251, 253, 0.95)",
                geometry.selected ? "rgba(37, 99, 173, 0.34)" : "rgba(37, 99, 173, 0.16)",
                1,
            );
            ctx.fillStyle = geometry.selected ? "#1b4c7a" : "#2563ad";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(geometry.label, lx, ly);
        }
    }

    function drawNode(node) {
        const p = worldToScreen(node.x, node.y);
        const { width, height } = nodeSize(node);
        const active = state.selectedNode && state.selectedNode.id === node.id;
        drawRoundedRect(
            p.x - width / 2,
            p.y - height / 2,
            width,
            height,
            11,
            node.role === "terminal"
                ? active ? "#fbefd6" : "#f8f1e3"
                : node.role === "merge"
                    ? active ? "#ddf8f2" : "#e9f8f5"
                    : active ? "#d7ebfa" : "#e8f3fb",
            node.role === "terminal"
                ? "#c79845"
                : node.role === "merge"
                    ? "#4cb89d"
                    : node.role === "branch" || node.role === "junction" ? "#3f84c6" : "#8ebad8",
            active ? 2.1 : 1.5,
        );
        ctx.fillStyle = node.role === "terminal" ? "#bf8a35" : node.role === "merge" ? "#257961" : "#2563ad";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = '700 12px "Segoe UI"';
        ctx.fillText(roleSymbol(node.role), p.x, p.y);
    }

    function draw(timestamp = performance.now()) {
        const rect = canvas.getBoundingClientRect();
        ctx.clearRect(0, 0, rect.width, rect.height);
        for (let index = 0; index < state.visibleEdges.length; index += 1) {
            drawEdge(state.visibleEdges[index], index, timestamp);
        }
        for (const node of state.visibleNodes) {
            drawNode(node);
        }
    }

    function findNodeAt(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        for (let i = state.visibleNodes.length - 1; i >= 0; i -= 1) {
            const node = state.visibleNodes[i];
            const p = worldToScreen(node.x, node.y);
            const { width, height } = nodeSize(node);
            if (
                x >= p.x - width / 2 &&
                x <= p.x + width / 2 &&
                y >= p.y - height / 2 &&
                y <= p.y + height / 2
            ) {
                return node;
            }
        }
        return null;
    }

    function centerOnNode(node) {
        if (!node) {
            return;
        }
        state.panX = -node.x;
        state.panY = -node.y;
        draw();
    }

    function fitGraph() {
        if (!state.visibleNodes.length) {
            return;
        }
        let minX = Infinity;
        let maxX = -Infinity;
        let minY = Infinity;
        let maxY = -Infinity;
        for (const node of state.visibleNodes) {
            const pad = nodeRadius(node) + 90;
            minX = Math.min(minX, node.x - pad);
            maxX = Math.max(maxX, node.x + pad);
            minY = Math.min(minY, node.y - pad);
            maxY = Math.max(maxY, node.y + pad);
        }
        const rect = canvas.getBoundingClientRect();
        const width = Math.max(80, maxX - minX);
        const height = Math.max(80, maxY - minY);
        const zx = Math.max(state.minZoom, (rect.width - 32) / width);
        const zy = Math.max(state.minZoom, (rect.height - 32) / height);
        state.zoom = Math.max(state.minZoom, Math.min(state.maxZoom, Math.min(zx, zy)));
        state.panX = -(minX + maxX) / 2;
        state.panY = -(minY + maxY) / 2;
        draw();
    }

    function resetView() {
        state.panX = 0;
        state.panY = 0;
        state.zoom = 1;
        draw();
    }

    function syncDrawer() {
        const open = state.drawerPinned || state.drawerHover;
        drawer.classList.toggle("is-pinned", state.drawerPinned);
        drawer.classList.toggle("is-open", open);
        drawerTrigger.classList.toggle("hidden", state.drawerPinned);
        pinBtn.textContent = state.drawerPinned ? t("unpin") : t("pin");
    }

    function openFilePicker() {
        if (state.loading) {
            return;
        }
        fileInput.click();
    }

    function openStageFilePickerIfEmpty() {
        if (state.loading || state.nodes.length > 0) {
            return;
        }
        fileInput.click();
    }

    function buildBuckets(cellSize) {
        const buckets = new Map();
        for (const node of state.visibleNodes) {
            const cellX = Math.floor(node.x / cellSize);
            const cellY = Math.floor(node.y / cellSize);
            const key = `${cellX}:${cellY}`;
            if (!buckets.has(key)) {
                buckets.set(key, []);
            }
            buckets.get(key).push(node);
        }
        return buckets;
    }

    function buildNeighborMap() {
        const neighbors = new Map(state.visibleNodes.map((node) => [node.id, new Set()]));
        for (const edge of state.visibleEdges) {
            neighbors.get(edge.source)?.add(edge.target);
            neighbors.get(edge.target)?.add(edge.source);
        }
        return neighbors;
    }

    function layoutScore(nodeId, neighbors) {
        const node = state.visibleNodeMap.get(nodeId);
        const linked = neighbors.get(nodeId)?.size || 0;
        return (
            linked * 8
            + Number(node?.outgoing || 0) * 4
            + Number(node?.incoming || 0) * 3
            + (node?.role === "branch" || node?.role === "junction" ? 6 : 0)
        );
    }

    function applyPairForces(pairScale) {
        const cellSize = 220;
        const repel = 23500 * pairScale;
        const collisionStrength = 0.34 * pairScale;
        const buckets = buildBuckets(cellSize);
        for (const [key, bucket] of buckets.entries()) {
            const split = key.split(":");
            const cellX = Number(split[0]);
            const cellY = Number(split[1]);
            const neighbors = [
                [cellX, cellY],
                [cellX + 1, cellY],
                [cellX, cellY + 1],
                [cellX + 1, cellY + 1],
                [cellX + 1, cellY - 1],
            ];
            for (const [nextX, nextY] of neighbors) {
                const other = buckets.get(`${nextX}:${nextY}`);
                if (!other) {
                    continue;
                }
                if (nextX === cellX && nextY === cellY) {
                    for (let i = 0; i < bucket.length; i += 1) {
                        const a = bucket[i];
                        for (let j = i + 1; j < bucket.length; j += 1) {
                            const b = bucket[j];
                            const lockA = state.dragNode && state.dragNode.id === a.id;
                            const lockB = state.dragNode && state.dragNode.id === b.id;
                            let dx = a.x - b.x;
                            let dy = a.y - b.y;
                            const dist2 = dx * dx + dy * dy + 0.01;
                            const dist = Math.sqrt(dist2);
                            dx /= dist;
                            dy /= dist;
                            const force = repel / dist2;
                            if (!lockA) {
                                a.vx += dx * force;
                                a.vy += dy * force;
                            }
                            if (!lockB) {
                                b.vx -= dx * force;
                                b.vy -= dy * force;
                            }
                            const minDist = nodeRadius(a) + nodeRadius(b) + 28;
                            if (dist < minDist) {
                                const overlap = minDist - dist;
                                const push = overlap * collisionStrength;
                                if (!lockA && !lockB) {
                                    a.x += dx * push * 0.5;
                                    a.y += dy * push * 0.5;
                                    b.x -= dx * push * 0.5;
                                    b.y -= dy * push * 0.5;
                                } else if (lockA && !lockB) {
                                    b.x -= dx * push;
                                    b.y -= dy * push;
                                } else if (!lockA && lockB) {
                                    a.x += dx * push;
                                    a.y += dy * push;
                                }
                                if (!lockA) {
                                    a.vx += dx * push * 0.12;
                                    a.vy += dy * push * 0.12;
                                }
                                if (!lockB) {
                                    b.vx -= dx * push * 0.12;
                                    b.vy -= dy * push * 0.12;
                                }
                            }
                        }
                    }
                    continue;
                }
                for (const a of bucket) {
                    for (const b of other) {
                        const lockA = state.dragNode && state.dragNode.id === a.id;
                        const lockB = state.dragNode && state.dragNode.id === b.id;
                        let dx = a.x - b.x;
                        let dy = a.y - b.y;
                        const dist2 = dx * dx + dy * dy + 0.01;
                        const dist = Math.sqrt(dist2);
                        dx /= dist;
                        dy /= dist;
                        const force = repel / dist2;
                        if (!lockA) {
                            a.vx += dx * force;
                            a.vy += dy * force;
                        }
                        if (!lockB) {
                            b.vx -= dx * force;
                            b.vy -= dy * force;
                        }
                        const minDist = nodeRadius(a) + nodeRadius(b) + 28;
                        if (dist < minDist) {
                            const overlap = minDist - dist;
                            const push = overlap * collisionStrength;
                            if (!lockA && !lockB) {
                                a.x += dx * push * 0.5;
                                a.y += dy * push * 0.5;
                                b.x -= dx * push * 0.5;
                                b.y -= dy * push * 0.5;
                            } else if (lockA && !lockB) {
                                b.x -= dx * push;
                                b.y -= dy * push;
                            } else if (!lockA && lockB) {
                                a.x += dx * push;
                                a.y += dy * push;
                            }
                            if (!lockA) {
                                a.vx += dx * push * 0.12;
                                a.vy += dy * push * 0.12;
                            }
                            if (!lockB) {
                                b.vx -= dx * push * 0.12;
                                b.vy -= dy * push * 0.12;
                            }
                        }
                    }
                }
            }
        }
    }

    function applyEdgeForces(edgeScale) {
        const spring = 0.0075 * edgeScale;
        for (const edge of state.visibleEdges) {
            const source = state.visibleNodeMap.get(edge.source);
            const target = state.visibleNodeMap.get(edge.target);
            if (!source || !target) {
                continue;
            }
            const dx = target.x - source.x;
            const dy = target.y - source.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const sourceDegree = Math.max(1, Number(source.visibleDegree || 0));
            const targetDegree = Math.max(1, Number(target.visibleDegree || 0));
            const degreeFactor = Math.sqrt((sourceDegree + targetDegree) / 2);
            const densityFactor = Math.max(0.48, Math.min(1, 2.4 / Math.sqrt(Math.max(1, state.visibleAverageDegree || 1))));
            const desired = 132 + Math.min(78, degreeFactor * 12) + (edge.label ? 26 : 0);
            const rawForce = ((dist - desired) * spring * densityFactor) / degreeFactor;
            const force = Math.max(-3.8, Math.min(3.8, rawForce));
            const ux = dx / dist;
            const uy = dy / dist;
            if (!state.dragNode || state.dragNode.id !== source.id) {
                source.vx += ux * force;
                source.vy += uy * force;
            }
            if (!state.dragNode || state.dragNode.id !== target.id) {
                target.vx -= ux * force;
                target.vy -= uy * force;
            }
        }
    }

    function applyCentering(centerScale) {
        if (!state.visibleNodes.length) {
            return;
        }
        let sumX = 0;
        let sumY = 0;
        for (const node of state.visibleNodes) {
            sumX += node.x;
            sumY += node.y;
        }
        const avgX = sumX / state.visibleNodes.length;
        const avgY = sumY / state.visibleNodes.length;
        for (const node of state.visibleNodes) {
            if (state.dragNode && state.dragNode.id === node.id) {
                continue;
            }
            node.vx -= (node.x - avgX) * centerScale;
            node.vy -= (node.y - avgY) * centerScale;
        }
    }

    function integrateNodes(dt, damping) {
        let maxMotion = 0;
        for (const node of state.visibleNodes) {
            if (state.dragNode && state.dragNode.id === node.id) {
                node.vx = 0;
                node.vy = 0;
                continue;
            }
            node.vx *= damping;
            node.vy *= damping;
            const speed = Math.hypot(node.vx, node.vy);
            const maxSpeed = 10;
            if (speed > maxSpeed) {
                const scale = maxSpeed / speed;
                node.vx *= scale;
                node.vy *= scale;
            }
            if (Math.abs(node.vx) < 0.0035) {
                node.vx = 0;
            }
            if (Math.abs(node.vy) < 0.0035) {
                node.vy = 0;
            }
            const stepX = Math.max(-22, Math.min(22, node.vx * dt));
            const stepY = Math.max(-22, Math.min(22, node.vy * dt));
            const nextX = node.x + stepX;
            const nextY = node.y + stepY;
            maxMotion = Math.max(maxMotion, Math.abs(nextX - node.x), Math.abs(nextY - node.y));
            node.x = nextX;
            node.y = nextY;
        }
        return maxMotion;
    }

    function seedVisibleNodes() {
        const neighbors = buildNeighborMap();
        const remaining = new Set(state.visibleNodes.map((node) => node.id));
        let componentIndex = 0;
        while (remaining.size) {
            const rootId = [...remaining].sort((a, b) => (
                layoutScore(b, neighbors) - layoutScore(a, neighbors)
                || String(a).localeCompare(String(b), "ja")
            ))[0];
            const queue = [rootId];
            const depthById = new Map([[rootId, 0]]);
            const levels = [];
            remaining.delete(rootId);
            while (queue.length) {
                const currentId = queue.shift();
                const depth = depthById.get(currentId) || 0;
                if (!levels[depth]) {
                    levels[depth] = [];
                }
                levels[depth].push(currentId);
                const ordered = [...(neighbors.get(currentId) || [])].sort((a, b) => (
                    layoutScore(b, neighbors) - layoutScore(a, neighbors)
                    || String(a).localeCompare(String(b), "ja")
                ));
                for (const nextId of ordered) {
                    if (!remaining.has(nextId)) {
                        continue;
                    }
                    remaining.delete(nextId);
                    depthById.set(nextId, depth + 1);
                    queue.push(nextId);
                }
            }
            const spreadRadius = Math.max(460, (levels.length + 1) * 180);
            const offsetX = componentIndex === 0 ? 0 : (componentIndex % 2 === 0 ? 1 : -1) * spreadRadius * 1.35;
            const offsetY = componentIndex === 0 ? 0 : (Math.floor(componentIndex / 2) - 0.5) * 280;
            for (const [depth, ids] of levels.entries()) {
                const ringRadius = depth === 0 ? 0 : 160 + depth * 150;
                const angleOffset = componentIndex * 0.75 + depth * 0.48;
                for (const [index, nodeId] of ids.entries()) {
                    const node = state.visibleNodeMap.get(nodeId);
                    if (!node) {
                        continue;
                    }
                    const angle = ids.length === 1
                        ? angleOffset
                        : angleOffset + (Math.PI * 2 * index) / ids.length;
                    const eccentricityX = 1 + ((index + depth) % 3) * 0.1;
                    const eccentricityY = 0.9 + ((index + componentIndex) % 4) * 0.08;
                    node.x = offsetX + Math.cos(angle) * ringRadius * eccentricityX;
                    node.y = offsetY + Math.sin(angle) * ringRadius * eccentricityY;
                    node.vx = 0;
                    node.vy = 0;
                }
            }
            componentIndex += 1;
        }
        for (const node of state.visibleNodes) {
            node.vx = 0;
            node.vy = 0;
        }
    }

    function layoutVisible(iterations = 260) {
        for (let step = 0; step < iterations; step += 1) {
            applyPairForces(1);
            applyEdgeForces(1);
            applyCentering(0.0011);
            integrateNodes(1, 0.84);
        }
        draw();
    }

    function stepPhysics(dt) {
        if (!state.visibleNodes.length) {
            return 0;
        }
        const alpha = Math.max(0, state.physicsAlpha);
        const forceScale = state.dragNode ? Math.max(alpha, 0.34) : alpha;
        if (forceScale > 0) {
            applyPairForces(forceScale);
            applyEdgeForces(forceScale);
            applyCentering(0.00032 * forceScale);
        }
        const maxMotion = integrateNodes(dt, 0.84);
        state.physicsAlpha = Math.max(0, alpha * 0.94 - 0.008);
        return maxMotion;
    }

    function runPhysicsFrame(timestamp) {
        if (!state.visibleNodes.length) {
            state.physicsFrame = 0;
            state.physicsClock = 0;
            syncEdgeAnimationLoop();
            return;
        }
        const dt = state.physicsClock ? Math.min(2.2, Math.max(0.72, (timestamp - state.physicsClock) / 16.6667)) : 1;
        state.physicsClock = timestamp;
        const maxMotion = stepPhysics(dt);
        draw();
        const keepRunning = !!state.dragNode || state.physicsAlpha > 0.01 || maxMotion > 0.025;
        if (keepRunning) {
            state.physicsFrame = window.requestAnimationFrame(runPhysicsFrame);
            return;
        }
        state.physicsFrame = 0;
        state.physicsClock = 0;
        for (const node of state.visibleNodes) {
            node.vx = 0;
            node.vy = 0;
        }
        syncEdgeAnimationLoop();
    }

    function kickPhysics(amount) {
        state.physicsAlpha = Math.max(state.physicsAlpha, amount);
        if (!state.physicsFrame) {
            state.physicsClock = 0;
            state.physicsFrame = window.requestAnimationFrame(runPhysicsFrame);
        }
        syncEdgeAnimationLoop();
    }

    function runEdgeAnimationFrame(timestamp) {
        if (!state.visibleEdges.length || state.loading) {
            state.edgeAnimationFrame = 0;
            state.edgeAnimationClock = 0;
            return;
        }
        if (!document.hidden && !state.physicsFrame) {
            if (!state.edgeAnimationClock || (timestamp - state.edgeAnimationClock) >= 41) {
                state.edgeAnimationClock = timestamp;
                draw(timestamp);
            }
        } else {
            state.edgeAnimationClock = timestamp;
        }
        state.edgeAnimationFrame = window.requestAnimationFrame(runEdgeAnimationFrame);
    }

    function renderLinkList(host, edges, mode) {
        host.replaceChildren();
        if (!edges.length) {
            const pill = document.createElement("div");
            pill.className = "pill";
            pill.textContent = t("noVisibleRelations");
            host.appendChild(pill);
            return;
        }
        for (const edge of edges) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "link-row";
            const nodeId = mode === "outgoing" ? edge.target : edge.source;
            const otherNode = state.nodeMap.get(nodeId);
            const text = document.createElement("div");
            text.className = "link-row-text";
            const otherLabel = otherNode ? nodeTitle(otherNode) : String(nodeId || "");
            const prefix = mode === "outgoing" ? t("toPrefix") : t("fromPrefix");
            text.textContent = edge.label ? `${prefix}${otherLabel} | ${edge.label}` : `${prefix}${otherLabel}`;
            button.appendChild(text);
            button.addEventListener("click", () => {
                if (otherNode && state.visibleNodeMap.has(otherNode.id)) {
                    centerOnNode(otherNode);
                    updateSelection(otherNode);
                }
            });
            host.appendChild(button);
        }
    }

    function updateSelection(node) {
        state.selectedNode = node || null;
        selectionMeta.replaceChildren();
        payloadList.replaceChildren();
        if (!state.selectedNode) {
            selectionBadge.textContent = t("none");
            selectionBadge.className = "pill";
            payloadBadge.textContent = "0";
            outgoingBadge.textContent = "0";
            incomingBadge.textContent = "0";
            renderLinkList(outgoingList, [], "outgoing");
            renderLinkList(incomingList, [], "incoming");
            const pill = document.createElement("div");
            pill.className = "pill";
            pill.textContent = t("selectionHint");
            selectionMeta.appendChild(pill);
            const payloadHint = document.createElement("div");
            payloadHint.className = "pill";
            payloadHint.textContent = t("payloadHint");
            payloadList.appendChild(payloadHint);
            draw();
            return;
        }
        const outgoing = (state.outgoingMap.get(state.selectedNode.id) || []).filter((edge) => state.visibleNodeMap.has(edge.target));
        const incoming = (state.incomingMap.get(state.selectedNode.id) || []).filter((edge) => state.visibleNodeMap.has(edge.source));
        selectionBadge.textContent = roleLabel(state.selectedNode.role);
        selectionBadge.className = state.selectedNode.role === "terminal" ? "pill start" : "pill";
        payloadBadge.textContent = String(payloadLines(state.selectedNode).length);
        outgoingBadge.textContent = String(outgoing.length);
        incomingBadge.textContent = String(incoming.length);
        const kv = document.createElement("dl");
        kv.className = "kv";
        const entries = [
            [t("nodeLabel"), nodeNumberLabel(state.selectedNode)],
            [t("sceneLabel"), nodeTitle(state.selectedNode)],
            [t("roleLabel"), roleLabel(state.selectedNode.role)],
            [t("lineCountLabel"), String(state.selectedNode.dialogue_count || 0)],
        ];
        for (const [k, v] of entries) {
            const dt = document.createElement("dt");
            dt.textContent = k;
            const dd = document.createElement("dd");
            dd.textContent = v;
            kv.appendChild(dt);
            kv.appendChild(dd);
        }
        selectionMeta.appendChild(kv);
        const lines = payloadLines(state.selectedNode);
        if (!lines.length) {
            const item = document.createElement("div");
            item.className = "pill";
            item.textContent = t("noPayload");
            payloadList.appendChild(item);
        } else {
            for (const line of lines) {
                const item = document.createElement("div");
                item.className = "payload-item";
                item.textContent = line;
                payloadList.appendChild(item);
            }
        }
        renderLinkList(outgoingList, outgoing, "outgoing");
        renderLinkList(incomingList, incoming, "incoming");
        draw();
    }

    function updateMeta() {
        const currentGraph = state.graphMap.get(state.graphId);
        graphMode.textContent = currentGraph ? t("graphModeGraph", { index: currentGraph.index }) : t("graphModeInteractive");
        statGraphs.textContent = String(currentGraph?.sceneCount || 0);
        statNodes.textContent = String(state.visibleNodes.length || 0);
        statEdges.textContent = String(state.visibleEdges.length || 0);
        chipGraph.textContent = currentGraph ? currentGraph.display : "-";
        chipNodes.textContent = String(state.visibleNodes.length || 0);
        chipEdges.textContent = String(state.visibleEdges.length || 0);
    }

    function buildGraphs() {
        const components = Array.isArray(state.raw?.components) ? state.raw.components : [];
        const buckets = new Map();
        for (const [index, component] of components.entries()) {
            buckets.set(String(component.id || `component:${index + 1}`), {
                id: String(component.id || `component:${index + 1}`),
                order: index,
                nodeIds: new Set(),
                sceneIds: new Set(),
                nodeCount: 0,
                edgeCount: 0,
                initialized: false,
            });
        }
        for (const node of state.nodes) {
            const key = graphKey(node);
            if (!buckets.has(key)) {
                buckets.set(key, {
                    id: key,
                    order: buckets.size,
                    nodeIds: new Set(),
                    sceneIds: new Set(),
                    nodeCount: 0,
                    edgeCount: 0,
                    initialized: false,
                });
            }
            const bucket = buckets.get(key);
            bucket.nodeIds.add(node.id);
            bucket.sceneIds.add(String(node.scene_id || node.scene_name || node.scene_no || ""));
            bucket.nodeCount += 1;
        }
        for (const edge of state.edges) {
            const source = state.nodeMap.get(edge.source);
            const target = state.nodeMap.get(edge.target);
            if (!source || !target) {
                continue;
            }
            const sourceKey = graphKey(source);
            const targetKey = graphKey(target);
            if (sourceKey !== targetKey || !buckets.has(sourceKey)) {
                continue;
            }
            buckets.get(sourceKey).edgeCount += 1;
        }
        state.graphs = [...buckets.values()]
            .sort((a, b) => (
                b.nodeCount - a.nodeCount
                || b.edgeCount - a.edgeCount
                || a.order - b.order
                || String(a.id).localeCompare(String(b.id), "ja")
            ))
            .map((bucket, index) => {
                const display = t("graphDisplay", { index: index + 1, nodes: bucket.nodeCount, edges: bucket.edgeCount });
                return {
                    id: bucket.id,
                    index: index + 1,
                    nodeIds: bucket.nodeIds,
                    sceneCount: bucket.sceneIds.size,
                    nodeCount: bucket.nodeCount,
                    edgeCount: bucket.edgeCount,
                    display,
                    initialized: false,
                };
            });
        state.graphMap = new Map(state.graphs.map((graph) => [graph.id, graph]));
    }

    function updateGraphSelect() {
        if (state.graphs.length <= 1) {
            graphSelect.classList.add("hidden");
            graphSelect.innerHTML = `<option value="">${t("currentGraph")}</option>`;
            return;
        }
        graphSelect.classList.remove("hidden");
        graphSelect.innerHTML = state.graphs.map((graph) => `<option value="${graph.id}">${graph.display}</option>`).join("");
        graphSelect.value = state.graphId;
    }

    function defaultGraphNode() {
        if (!state.visibleNodes.length) {
            return null;
        }
        const roots = state.visibleNodes
            .filter((node) => Number(node.incoming || 0) === 0)
            .sort((a, b) => (
                Number(a.start_line || 0) - Number(b.start_line || 0)
                || Number(a.node_no || 0) - Number(b.node_no || 0)
            ));
        if (roots.length) {
            return roots[0];
        }
        return state.visibleNodes
            .slice()
            .sort((a, b) => (
                Number(a.start_line || 0) - Number(b.start_line || 0)
                || Number(a.node_no || 0) - Number(b.node_no || 0)
            ))[0] || null;
    }

    function applyCurrentGraph(reseed) {
        const graph = state.graphMap.get(state.graphId);
        if (!graph) {
            state.visibleNodes = [];
            state.visibleEdges = [];
            state.visibleNodeMap = new Map();
            updateMeta();
            updateSelection(null);
            setSearchStatus(t("searchNoGraph"));
            clearSearchResults();
            draw();
            return;
        }
        state.visibleNodes = state.nodes.filter((node) => graph.nodeIds.has(node.id));
        state.visibleEdges = state.edges.filter((edge) => graph.nodeIds.has(edge.source) && graph.nodeIds.has(edge.target));
        state.visibleNodeMap = new Map(state.visibleNodes.map((node) => [node.id, node]));
        for (const node of state.visibleNodes) {
            node.visibleDegree = 0;
        }
        for (const edge of state.visibleEdges) {
            const source = state.visibleNodeMap.get(edge.source);
            const target = state.visibleNodeMap.get(edge.target);
            if (source) {
                source.visibleDegree += 1;
            }
            if (target) {
                target.visibleDegree += 1;
            }
        }
        state.visibleAverageDegree = state.visibleNodes.length ? (state.visibleEdges.length * 2) / state.visibleNodes.length : 0;
        if (reseed || !graph.initialized) {
            seedVisibleNodes();
            layoutVisible();
            graph.initialized = true;
        }
        updateMeta();
        const selectedNode = defaultGraphNode();
        updateSelection(selectedNode);
        setSearchStatus(state.visibleNodes.length ? t("searchReady") : t("searchNoGraph"));
        clearSearchResults();
        fitGraph();
        kickPhysics(0.42);
        syncEdgeAnimationLoop();
        draw();
    }

    function loadData(graphData) {
        if (!graphData || !Array.isArray(graphData.nodes) || !Array.isArray(graphData.edges)) {
            emptyState.classList.remove("hidden");
            emptyState.textContent = t("invalidTutorialJson");
            clearSearchResults();
            return;
        }
        state.raw = graphData;
        state.nodes = graphData.nodes.map((node) => ({ ...node, role: roleOf(node), x: 0, y: 0, vx: 0, vy: 0 }));
        state.edges = graphData.edges.map((edge, index) => ({
            ...edge,
            motionOffset: (hashText([
                String(edge.source || ""),
                String(edge.target || ""),
                String(edge.kind || ""),
                String(edge.label || ""),
                String(edge.id || index),
            ].join("\u0000")) % 4096) / 4096,
        }));
        const parallelGroups = new Map();
        for (const edge of state.edges) {
            const key = `${String(edge.source || "")}\u0000${String(edge.target || "")}`;
            if (!parallelGroups.has(key)) {
                parallelGroups.set(key, []);
            }
            parallelGroups.get(key).push(edge);
        }
        for (const group of parallelGroups.values()) {
            group
                .sort((a, b) => [
                    String(a.label || ""),
                    String(a.kind || ""),
                    String(a.id || ""),
                ].join("\u0000").localeCompare([
                    String(b.label || ""),
                    String(b.kind || ""),
                    String(b.id || ""),
                ].join("\u0000"), "ja"))
                .forEach((edge, index) => {
                    edge.parallelIndex = index;
                    edge.parallelCount = group.length;
                });
        }
        state.nodeMap = new Map();
        state.outgoingMap = new Map();
        state.incomingMap = new Map();
        for (const node of state.nodes) {
            state.nodeMap.set(node.id, node);
            state.outgoingMap.set(node.id, []);
            state.incomingMap.set(node.id, []);
        }
        for (const edge of state.edges) {
            if (state.outgoingMap.has(edge.source)) {
                state.outgoingMap.get(edge.source).push(edge);
            }
            if (state.incomingMap.has(edge.target)) {
                state.incomingMap.get(edge.target).push(edge);
            }
        }
        for (const list of state.outgoingMap.values()) {
            list.sort((a, b) => String(a.target).localeCompare(String(b.target), "ja"));
        }
        for (const list of state.incomingMap.values()) {
            list.sort((a, b) => String(a.source).localeCompare(String(b.source), "ja"));
        }
        buildGraphs();
        state.graphId = state.graphs[0]?.id || "";
        state.selectedNode = null;
        state.panX = 0;
        state.panY = 0;
        state.zoom = 1;
        setSearchStatus(state.nodes.length ? t("searchReady") : t("searchNoGraph"));
        updateGraphSelect();
        emptyState.classList.add("hidden");
        applyCurrentGraph(true);
        document.title = `${graphData?.source?.name || "tutorial graph"} - ${t("viewerTitleSuffix")}`;
    }

    canvas.addEventListener("mousedown", (event) => {
        state.mouseDown = true;
        state.lastX = event.clientX;
        state.lastY = event.clientY;
        state.dragClock = event.timeStamp || performance.now();
        state.dragNode = findNodeAt(event.clientX, event.clientY);
        state.panMode = !state.dragNode;
        if (state.dragNode) {
            state.dragNode.vx = 0;
            state.dragNode.vy = 0;
            updateSelection(state.dragNode);
            kickPhysics(0.2);
        }
    });

    window.addEventListener("mouseup", () => {
        if (state.dragNode) {
            kickPhysics(0.9);
        }
        state.mouseDown = false;
        state.dragNode = null;
        state.panMode = false;
    });

    window.addEventListener("mousemove", (event) => {
        if (!state.mouseDown) {
            return;
        }
        const dx = event.clientX - state.lastX;
        const dy = event.clientY - state.lastY;
        state.lastX = event.clientX;
        state.lastY = event.clientY;
        if (state.dragNode) {
            const rect = canvas.getBoundingClientRect();
            const world = screenToWorld(event.clientX - rect.left, event.clientY - rect.top);
            const now = event.timeStamp || performance.now();
            const elapsed = Math.max(1, now - state.dragClock);
            const prevX = state.dragNode.x;
            const prevY = state.dragNode.y;
            state.dragNode.x = world.x;
            state.dragNode.y = world.y;
            state.dragNode.vx = ((world.x - prevX) / elapsed) * 16.6667;
            state.dragNode.vy = ((world.y - prevY) / elapsed) * 16.6667;
            state.dragClock = now;
            kickPhysics(0.34);
            draw();
            return;
        }
        if (state.panMode) {
            state.panX += dx / state.zoom;
            state.panY += dy / state.zoom;
            draw();
        }
    });

    canvas.addEventListener("wheel", (event) => {
        event.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const screenX = event.clientX - rect.left;
        const screenY = event.clientY - rect.top;
        const worldBefore = screenToWorld(screenX, screenY);
        const factor = event.deltaY < 0 ? 1.09 : 0.91;
        state.zoom = Math.max(state.minZoom, Math.min(state.maxZoom, state.zoom * factor));
        const worldAfter = screenToWorld(screenX, screenY);
        state.panX += worldAfter.x - worldBefore.x;
        state.panY += worldAfter.y - worldBefore.y;
        draw();
    }, { passive: false });

    syncDrawer();
    applyTheme();
    applyLanguage();
    setSearchStatus(t("idle"));
    clearSearchResults();
    updateMeta();
    updateSelection(null);
    resizeCanvas();
    const startupJsonUrl = autoLoadUrl();
    if (startupJsonUrl) {
        void openGraphUrl(startupJsonUrl);
    }
})();
</script>
</body>
