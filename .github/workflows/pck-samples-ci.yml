name: PCK Samples CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pck-samples:
    name: PCK Samples
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configure git for CRLF
        run: |
          git config --global core.autocrlf true
          git config --global core.eol crlf
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.1
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Cache pck samples
        uses: actions/cache@v4
        with:
          path: .cache/pck-samples
          key: pck-samples-0-1-main-v1
          restore-keys: |
            pck-samples-0-1-main-

      - name: Install dependencies
        run: uv sync

      - name: Run exact pck samples
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run python scripts/run_pck_samples_test.py --work-dir .cache/pck-samples --subdir 0 --serial --expected-status EXACT --command siglus-ssu

      - name: Run payload-same pck samples
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run python scripts/run_pck_samples_test.py --work-dir .cache/pck-samples --subdir 1 --expected-status PAYLOAD_SAME --command siglus-ssu
